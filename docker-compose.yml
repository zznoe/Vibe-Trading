services:
  vibe-trading:
    image: iyocn/vibe-trading:latest
    ports:
      - "127.0.0.1:8899:8899"
    environment:
      - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
      - vibe-home:/home/vibe/.vibe-trading
      - vibe-swarm-runs:/app/agent/.swarm/runs
      - vibe-uploads:/app/agent/uploads
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp
      - /home/vibe/.cache
      - /home/vibe/.config
    mem_limit: 4g
    cpus: 2
    pids_limit: 512
    restart: unless-stopped

volumes:
  vibe-runs:
  vibe-sessions:
  vibe-home:
  vibe-swarm-runs:
  vibe-uploads:
