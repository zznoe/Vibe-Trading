services:
  vibe-trading:
    image: iyocn/vibe-trading:latest
    ports:
      - "127.0.0.1:8899:8899"
    environment:
      # Agnes AI (default)
      - OPENAI_API_KEY=${AGNES_API_KEY}
      - OPENAI_BASE_URL=https://apihub.agnes-ai.com/v1
      # Zhipu AI / z.ai
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_BASE_URL=https://api.z.ai/api/paas/v4
      # DeepSeek
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
      - vibe-home:/home/vibe/.vibe-trading
      - vibe-swarm-runs:/app/agent/.swarm/runs
      - vibe-uploads:/app/agent/uploads
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp
      - /home/vibe/.cache
      - /home/vibe/.config
    mem_limit: 4g
    cpus: 2
    pids_limit: 512
    restart: unless-stopped

volumes:
  vibe-runs:
  vibe-sessions:
  vibe-home:
  vibe-swarm-runs:
  vibe-uploads:
