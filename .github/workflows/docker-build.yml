name: Build and Deploy Vibe-Trading

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/vibe-trading
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/vibe-trading

            OLD_IMAGE=$(docker inspect vibe-trading-vibe-trading-1 --format="{{.Config.Image}}" 2>/dev/null || echo "")

            docker-compose pull
            docker-compose up -d

            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://127.0.0.1:8899/live > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
            done

            echo "Health check FAILED! Rolling back..."
            if [ -n "$OLD_IMAGE" ]; then
              docker stop vibe-trading-vibe-trading-1 2>/dev/null
              docker rm vibe-trading-vibe-trading-1 2>/dev/null
              sed -i "s|iyocn/vibe-trading:.*|$OLD_IMAGE|" docker-compose.yml
              docker-compose up -d
              echo "Rolled back to $OLD_IMAGE"
              exit 1
            else
              echo "No previous image to rollback to!"
              exit 1
            fi

            docker image prune -f
